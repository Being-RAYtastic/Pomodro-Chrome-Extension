<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- FOR ICONS ☝️ -->

    <title>Pomodro App</title>
</head>

<body>

    <div class="container">
        <div class="timerDisplay">
            <h3 id="timer">00:00</h3>
        </div>
        <div class="utilBtns">
            <button id="actionTimerBtn" class="fa-solid fa-play">
            </button>
            <button id="resetTimerBtn">
                <i class="fa-solid fa-rotate-left"></i>
            </button>
        </div>


        <button id="settingsBtn">
            <i class="fa-solid fa-gear"></i>
        </button>

        <div class="settingsMenuContainer">
            <div id="settingsMenu" class="hidden">
                <div class="navbar">
                    <button id="focusSettingsMenuBtn" class="active">focus</button>
                    <button id="breakSettingsMenuBtn">break</button>
                </div>
                <div class="focusSettings">
                    <div class="desc">Focus Settings</div>
                    <input type="number" id="focusHours" placeholder="HH" min="0" max="23" pad>
                    <input type="number" id="focusMinutes" placeholder="MM" min="0" max="59">
                    <input type="number" id="focusSeconds" placeholder="SS" min="0" max="59">
                    <button id="saveFocusBtn">Save</button>
                </div>
                
                <div class="breakSettings hidden">
                    <div class="desc">Break Settings</div>
                    <input type="number" id="breakHours" placeholder="HH" min="0" max="23" pad>
                    <input type="number" id="breakMinutes" placeholder="MM" min="0" max="59">
                    <input type="number" id="breakSeconds" placeholder="SS" min="0" max="59">
                    <button id="saveBreakBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="timeOver" src="timeup.mp3"></audio>

</body>


<script src="index.js"></script>

</html>
